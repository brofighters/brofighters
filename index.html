<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bro Fighters</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #14141c;
        color: #e6e6f0;
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
      }
      canvas {
        background: #20202c;
        border: 1px solid #33334a;
        image-rendering: pixelated;
        max-width: 100vw;
        max-height: 82vh;
      }
      #hint { font-size: 12px; color: #8a8aa0; text-align: center; line-height: 1.5; }
      kbd {
        background: #2c2c3c; border: 1px solid #44445c; border-radius: 4px;
        padding: 1px 5px; font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="960" height="540"></canvas>
      <div id="hint">
        <strong>Keyboard P1:</strong>
        <kbd>WASD</kbd> move &middot; <kbd>F</kbd> attack &middot;
        <kbd>G</kbd> jump &middot; <kbd>H</kbd> defend &nbsp;|&nbsp;
        <strong>Keyboard P2:</strong>
        <kbd>Arrows</kbd> move &middot; <kbd>Numpad 1</kbd> attack &middot;
        <kbd>Numpad 2</kbd> jump &middot; <kbd>Numpad 3</kbd> defend &nbsp;|&nbsp;
        <strong>Gamepads</strong> auto-join &middot; <strong>Special:</strong> block+back+jump
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
